<!doctype html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TenderAI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="{% url 'dashboard' %}">TenderAI</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="nav">
      <div class="navbar-nav">
        <a class="nav-link" href="{% url 'companies:list' %}">Companies</a>
        <a class="nav-link" href="{% url 'documents:list' %}">Documents</a>
        <a class="nav-link" href="{% url 'tenders:list' %}">Tenders</a>
        <a class="nav-link" href="{% url 'quotations:quotation_list' %}">Quotations</a>
        <a class="nav-link" href="{% url 'quotations:invoice_list' %}">Invoices</a>
        <a class="nav-link" href="{% url 'bid_generator:list' %}">Bid Packs</a>
        <a class="nav-link" href="{% url 'core:settings' %}">Settings</a>
        <a class="nav-link" href="{% url 'admin:index' %}">Admin</a>
        {% if user.is_authenticated %}<a class="nav-link" href="{% url 'logout' %}">Logout</a>{% endif %}
      </div>
    </div>
  </div>
</nav>
<main class="container app-shell">
  {% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>{% endfor %}
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
