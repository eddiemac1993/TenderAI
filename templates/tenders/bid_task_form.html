{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-start gap-3 mb-3 flex-wrap">
  <div>
    <p class="eyebrow mb-1">Bid task tracker</p>
    <h1 class="h3 mb-1">Add task</h1>
    <p class="text-muted mb-0">{{ tender.title }}</p>
  </div>
  <a class="btn btn-outline-secondary" href="{% url 'tenders:tasks' tender.pk %}">Back to tasks</a>
</div>
<form method="post" class="app-card app-form">
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3">
      <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% for error in field.errors %}<div class="invalid-feedback d-block">{{ error }}</div>{% endfor %}
    </div>
  {% endfor %}
  <div class="form-actions">
    <button class="btn btn-primary" type="submit">Add task</button>
    <a class="btn btn-outline-secondary" href="{% url 'tenders:tasks' tender.pk %}">Cancel</a>
  </div>
</form>
{% endblock %}
