{% extends "base.html" %}
{% block content %}
<div class="app-card app-form mx-auto" style="max-width: 460px;">
  <p class="eyebrow mb-1">Secure access</p>
  <h1 class="h3 mb-3">Sign in to TenderAI</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary w-100" type="submit">Sign in</button>
  </form>
  <p class="small text-muted mt-3 mb-0">New to TenderAI? <a href="{% url 'register' %}">Create an account</a>.</p>
</div>
{% endblock %}
