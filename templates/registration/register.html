{% extends "base.html" %}
{% block content %}
<div class="app-card app-form mx-auto" style="max-width: 560px;">
  <p class="eyebrow mb-1">Create account</p>
  <h1 class="h3 mb-2">Register for TenderAI</h1>
  <p class="text-muted">New accounts can use the dashboard and ZPPA scraping. Admin grants full feature access from the admin dashboard.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary w-100" type="submit">Create account</button>
  </form>
  <p class="small text-muted mt-3 mb-0">Already registered? <a href="{% url 'login' %}">Sign in</a>.</p>
</div>
{% endblock %}
