{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h1 class="h3">Invoices</h1><a class="btn btn-primary" href="{% url 'quotations:invoice_create' %}">Create invoice</a></div>
<div class="list-group">{% for invoice in invoices %}<a class="list-group-item list-group-item-action" href="{{ invoice.get_absolute_url }}">{{ invoice.number }} - {{ invoice.customer_name }} <span class="text-muted">{{ invoice.date }}</span></a>{% empty %}<div class="list-group-item text-muted">No invoices.</div>{% endfor %}</div>
{% endblock %}
